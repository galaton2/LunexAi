<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Lunex AI</title>
    
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">

    <style>
        /* --- ТЕМЫ: НЕОМОРФИЗМ (Dark & Light) --- */
        :root {
            /* Dark Mode (Default) */
            --bg-color: #1e1e24;
            --text-main: #e0e5ec;
            --text-muted: #8a8a9d;
            --ai-green: #00ff88;
            --ai-green-glow: rgba(0, 255, 136, 0.4);
            
            /* Неоморфные тени (Темные) */
            --shadow-out: 6px 6px 12px #151519, -6px -6px 12px #27272f;
            --shadow-in: inset 6px 6px 12px #151519, inset -6px -6px 12px #27272f;
            --shadow-btn-active: inset 4px 4px 8px #151519, inset -4px -4px 8px #27272f;
        }

        [data-theme="light"] {
            --bg-color: #e0e5ec;
            --text-main: #2d3142;
            --text-muted: #7b8397;
            --ai-green: #00c968;
            --ai-green-glow: rgba(0, 201, 104, 0.4);
            
            /* Неоморфные тени (Светлые) */
            --shadow-out: 9px 9px 16px rgb(163,177,198,0.6), -9px -9px 16px rgba(255,255,255, 0.5);
            --shadow-in: inset 6px 6px 10px 0 rgba(163,177,198, 0.7), inset -6px -6px 10px 0 rgba(255,255,255, 0.8);
            --shadow-btn-active: inset 4px 4px 8px rgb(163,177,198,0.6), inset -4px -4px 8px rgba(255,255,255, 0.5);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; -webkit-tap-highlight-color: transparent; }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            overflow-x: hidden;
            padding-bottom: 90px;
            transition: background-color 0.4s, color 0.4s;
        }

        /* --- UI КОМПОНЕНТЫ --- */
        .header {
            padding: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .header h1 { font-size: 24px; font-weight: 700; }
        .ai-status {
            display: flex; align-items: center; gap: 8px; font-size: 12px; font-weight: 600; color: var(--ai-green); text-transform: uppercase; letter-spacing: 1px;
        }
        .ai-dot {
            width: 8px; height: 8px; background-color: var(--ai-green); border-radius: 50%;
            box-shadow: 0 0 10px var(--ai-green);
            animation: pulse 2s infinite;
        }
        @keyframes pulse { 0% { box-shadow: 0 0 0 0 var(--ai-green-glow); } 70% { box-shadow: 0 0 0 10px rgba(0,255,136,0); } 100% { box-shadow: 0 0 0 0 rgba(0,255,136,0); } }

        .neu-box {
            background: var(--bg-color); border-radius: 20px; box-shadow: var(--shadow-out); padding: 20px; margin: 15px 20px; transition: 0.3s;
        }
        .neu-box-inset {
            background: var(--bg-color); border-radius: 15px; box-shadow: var(--shadow-in); padding: 15px; margin: 10px 20px;
        }

        /* --- DASHBOARD СТАТИСТИКА --- */
        .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin: 0 20px 20px; }
        .stat-card {
            background: var(--bg-color); border-radius: 20px; box-shadow: var(--shadow-out); padding: 20px; text-align: center;
        }
        .stat-val { font-size: 32px; font-weight: 800; color: var(--ai-green); text-shadow: 0 0 15px var(--ai-green-glow); }
        .stat-lbl { font-size: 12px; color: var(--text-muted); font-weight: 600; margin-top: 5px; text-transform: uppercase; }

        /* --- СПИСКИ (ЗАДАЧИ И ЗАМЕТКИ) --- */
        .section-title { font-size: 16px; font-weight: 600; margin: 25px 20px 15px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 1px; }

        .task-item {
            display: flex; justify-content: space-between; align-items: center; background: var(--bg-color);
            border-radius: 16px; box-shadow: var(--shadow-out); padding: 16px; margin: 0 20px 15px;
            transition: all 0.2s ease;
        }
        .task-item:active { box-shadow: var(--shadow-btn-active); transform: scale(0.98); }
        .task-content { flex-grow: 1; margin-right: 15px; font-size: 15px; font-weight: 500; line-height: 1.4; }
        
        .neu-checkbox {
            width: 26px; height: 26px; border-radius: 50%; background: var(--bg-color); box-shadow: var(--shadow-in);
            display: flex; justify-content: center; align-items: center; cursor: pointer; transition: 0.3s;
        }
        .neu-checkbox i { font-size: 12px; color: var(--ai-green); opacity: 0; transition: 0.3s; text-shadow: 0 0 8px var(--ai-green); }
        .task-item.completed .neu-checkbox i { opacity: 1; }
        .task-item.completed .task-content { text-decoration: line-through; color: var(--text-muted); opacity: 0.6; }

        .note-item { border-left: 3px solid var(--ai-green); }
        .note-item p { font-size: 14px; }

        /* --- BOTTOM NAVIGATION --- */
        .bottom-nav {
            position: fixed; bottom: 0; left: 0; width: 100%; height: 80px;
            background: var(--bg-color); box-shadow: 0 -5px 20px rgba(0,0,0,0.1);
            display: flex; justify-content: space-around; align-items: center; z-index: 1000;
            border-radius: 30px 30px 0 0;
        }
        .nav-btn {
            width: 60px; height: 60px; border-radius: 50%; display: flex; justify-content: center; align-items: center;
            color: var(--text-muted); font-size: 20px; background: var(--bg-color); box-shadow: var(--shadow-out);
            transition: all 0.3s ease; cursor: pointer;
        }
        .nav-btn.active { box-shadow: var(--shadow-btn-active); color: var(--ai-green); text-shadow: 0 0 10px var(--ai-green-glow); transform: scale(0.95); }

        /* --- ЛОАДЕР И ВКЛАДКИ --- */
        .tab-content { display: none; animation: fadeSlide 0.4s ease forwards; }
        .tab-content.active { display: block; }
        @keyframes fadeSlide { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }

        #loader { text-align: center; margin-top: 50px; color: var(--ai-green); }
    </style>
</head>
<body>

    <header class="header">
        <div>
            <h1 id="userName">Lunex AI</h1>
            <div class="ai-status"><div class="ai-dot"></div> <span id="userVibe">Синхронизация...</span></div>
        </div>
        <div class="neu-box" style="padding: 12px; margin: 0; border-radius: 50%; cursor: pointer;" onclick="toggleTheme()">
            <i class="fas fa-moon" id="themeIcon" style="color: var(--text-main);"></i>
        </div>
    </header>

    <div id="loader"><i class="fas fa-circle-notch fa-spin fa-2x" style="filter: drop-shadow(0 0 10px var(--ai-green));"></i></div>

    <main id="tab-dashboard" class="tab-content">
        <div class="neu-box-inset">
            <p style="font-size: 14px; line-height: 1.5;"><i class="fas fa-brain" style="color: var(--ai-green);"></i> ИИ Анализ: <span id="aiSummary">Ожидаю данные из базы...</span></p>
        </div>

        <div class="stats-grid">
            <div class="stat-card">
                <div class="stat-val" id="statTasks">0</div>
                <div class="stat-lbl">Задач</div>
            </div>
            <div class="stat-card">
                <div class="stat-val" id="statNotes">0</div>
                <div class="stat-lbl">Мыслей</div>
            </div>
        </div>

        <h2 class="section-title">Активные таймеры</h2>
        <div id="remindersList"></div>
    </main>

    <main id="tab-tasks" class="tab-content">
        <h2 class="section-title">В фокусе (Свайп для выполнения)</h2>
        <div id="tasksList"></div>
    </main>

    <main id="tab-notes" class="tab-content">
        <h2 class="section-title">База знаний</h2>
        <div id="notesList"></div>
    </main>

    <nav class="bottom-nav">
        <div class="nav-btn active" onclick="switchTab('dashboard', this)"><i class="fas fa-home"></i></div>
        <div class="nav-btn" onclick="switchTab('tasks', this)"><i class="fas fa-check-double"></i></div>
        <div class="nav-btn" onclick="switchTab('notes', this)"><i class="fas fa-database"></i></div>
    </nav>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.10.0/firebase-app.js";
        import { getFirestore, doc, onSnapshot, updateDoc } from "https://www.gstatic.com/firebasejs/10.10.0/firebase-firestore.js";

        // 1. Инициализация Telegram
        const tg = window.Telegram.WebApp;
        tg.expand();
        tg.ready();

        // Установка имени
        if (tg.initDataUnsafe.user) {
            document.getElementById('userName').innerText = tg.initDataUnsafe.user.first_name;
        }
        
        // Получаем ID пользователя (Если открыто в браузере без ТГ, используем ID для теста)
        const userId = tg.initDataUnsafe?.user?.id?.toString() || "8562313043";

        // Смена темы (Neumorphism)
        window.toggleTheme = function() {
            const body = document.body;
            const icon = document.getElementById('themeIcon');
            tg.HapticFeedback.impactOccurred('light');
            
            if (body.getAttribute('data-theme') === 'light') {
                body.removeAttribute('data-theme');
                icon.className = 'fas fa-moon';
                tg.setBackgroundColor('#1e1e24');
                tg.setHeaderColor('#1e1e24');
            } else {
                body.setAttribute('data-theme', 'light');
                icon.className = 'fas fa-sun';
                tg.setBackgroundColor('#e0e5ec');
                tg.setHeaderColor('#e0e5ec');
            }
        };

        // Логика вкладок
        window.switchTab = function(tabId, btn) {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(`tab-${tabId}`).classList.add('active');
            btn.classList.add('active');
            tg.HapticFeedback.impactOccurred('light');
        };

        // 2. Инициализация Firebase
        const firebaseConfig = {
            apiKey: "AIzaSyDY8g42qsSkoN36i-DIeptehoDWXSEUlU0",
            authDomain: "lunex-f5362.firebaseapp.com",
            projectId: "lunex-f5362",
            storageBucket: "lunex-f5362.firebasestorage.app",
            messagingSenderId: "364220464927",
            appId: "1:364220464927:web:95531c2ac9de3aaa343a2a"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        let currentUserData = null;

        // 3. REAL-TIME СИНХРОНИЗАЦИЯ С БАЗОЙ
        const userDocRef = doc(db, "users", userId);
        
        onSnapshot(userDocRef, (docSnap) => {
            document.getElementById('loader').style.display = 'none';
            document.getElementById('tab-dashboard').classList.add('active');

            if (docSnap.exists()) {
                currentUserData = docSnap.data();
                renderApp(currentUserData);
            } else {
                document.getElementById('aiSummary').innerText = "База пуста. Напиши боту свою первую задачу!";
            }
        }, (error) => {
            console.error("Firebase Error:", error);
            document.getElementById('aiSummary').innerText = "Ошибка подключения к базе данных.";
        });

        // 4. Отрисовка интерфейса
        function renderApp(data) {
            const tasks = data.tasks_short || [];
            const notes = data.notes || [];
            const reminders = data.reminders || [];
            const vibe = data.current_vibe || "Система активна";

            document.getElementById('userVibe').innerText = vibe;
            document.getElementById('statTasks').innerText = tasks.length;
            document.getElementById('statNotes').innerText = notes.length;
            
            document.getElementById('aiSummary').innerText = `Задач в фокусе: ${tasks.length}. Инсайтов: ${notes.length}. Я готов к работе.`;

            // Рендер задач
            const tasksContainer = document.getElementById('tasksList');
            if(tasks.length === 0) {
                tasksContainer.innerHTML = '<div class="neu-box-inset" style="text-align:center; color: var(--text-muted);">Всё выполнено! Выдыхай.</div>';
            } else {
                tasksContainer.innerHTML = tasks.map((t, index) => `
                    <div class="task-item" onclick="completeTask(${index})">
                        <div class="task-content">${t}</div>
                        <div class="neu-checkbox"><i class="fas fa-check"></i></div>
                    </div>
                `).join('');
            }

            // Рендер заметок
            const notesContainer = document.getElementById('notesList');
            notesContainer.innerHTML = notes.map(n => `
                <div class="neu-box-inset note-item">
                    <p>${n}</p>
                </div>
            `).join('');

            // Рендер таймеров
            const remContainer = document.getElementById('remindersList');
            remContainer.innerHTML = reminders.map(r => `
                <div class="neu-box-inset">
                    <div style="display:flex; justify-content:space-between;">
                        <span style="font-weight:600;">${r.text}</span>
                        <span style="color: var(--ai-green); font-size:12px;"><i class="far fa-clock"></i> ${r.datetime.split(' ')[1]}</span>
                    </div>
                </div>
            `).join('');
        }

        // 5. Выполнение задачи (Обновление в Firebase)
        window.completeTask = async function(taskIndex) {
            if(!currentUserData) return;
            
            tg.HapticFeedback.impactOccurred('medium');
            
            // Получаем элемент и добавляем класс для анимации зачеркивания
            const taskElements = document.querySelectorAll('.task-item');
            taskElements[taskIndex].classList.add('completed');

            // Удаляем задачу из массива
            let updatedTasks = [...currentUserData.tasks_short];
            updatedTasks.splice(taskIndex, 1);

            // Отправляем изменения в Firebase
            try {
                await updateDoc(userDocRef, {
                    tasks_short: updatedTasks
                });
                // После успешного обновления, onSnapshot сам перерисует интерфейс!
            } catch (error) {
                console.error("Ошибка при обновлении задачи:", error);
                taskElements[taskIndex].classList.remove('completed'); // Откатываем анимацию при ошибке
            }
        };
    </script>
</body>
</html>
