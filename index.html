<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Lunex PRO</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        /* --- DESIGN SYSTEM: STAR.AI PREMIUM --- */
        :root {
            --bg-dark: #050508;
            --bg-card: rgba(25, 25, 30, 0.6);
            --bg-modal: rgba(15, 15, 18, 0.95);
            --card-border: rgba(255, 255, 255, 0.08);
            --pink-main: #ff477e;
            --pink-glow: rgba(255, 71, 126, 0.4);
            --text-main: #ffffff;
            --text-muted: #a0a0b0;
            --category-work: #00f0ff;
            --category-ideas: #ffd700;
            --category-buy: #ff9900;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; -webkit-tap-highlight-color: transparent; }

        body {
            background: radial-gradient(circle at 50% -10%, #4a0d26 0%, var(--bg-dark) 50%);
            background-color: var(--bg-dark);
            color: var(--text-main);
            min-height: 100vh;
            padding-bottom: 110px;
            overflow-x: hidden;
            background-attachment: fixed;
        }

        /* --- TOP BAR & GREETING --- */
        .top-bar { display: flex; justify-content: space-between; align-items: center; padding: 20px 24px 10px; }
        .premium-badge { background: var(--pink-glow); color: #fff; font-size: 12px; font-weight: 600; padding: 6px 14px; border-radius: 20px; border: 1px solid var(--pink-main); box-shadow: 0 0 12px var(--pink-glow); display: flex; align-items: center; gap: 6px; }
        .avatar { width: 42px; height: 42px; border-radius: 50%; border: 2px solid var(--card-border); object-fit: cover; }
        .greeting { padding: 10px 24px 20px; }
        .greeting h1 { font-size: 28px; font-weight: 700; margin-bottom: 6px; }
        .greeting p { font-size: 13px; color: var(--text-muted); line-height: 1.5; }

        /* --- TABS --- */
        .tab-content { display: none; animation: fadeIn 0.3s ease; padding: 0 20px; }
        .tab-content.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* --- UI COMPONENTS --- */
        .section-title { font-size: 14px; font-weight: 700; color: var(--text-muted); margin: 25px 0 15px; text-transform: uppercase; letter-spacing: 1px; }
        
        .grid-cards { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        .card { background: var(--bg-card); border: 1px solid var(--card-border); border-radius: 20px; padding: 16px; min-height: 120px; display: flex; flex-direction: column; justify-content: space-between; backdrop-filter: blur(10px); transition: 0.2s; cursor: pointer; position: relative; overflow: hidden; }
        .card:active { transform: scale(0.96); border-color: var(--pink-main); }
        .card-text { font-size: 14px; font-weight: 500; line-height: 1.4; z-index: 2; }
        .card-icon { font-size: 16px; color: var(--text-muted); z-index: 2; display: flex; justify-content: space-between; align-items: center; width: 100%; margin-top: 15px; }
        
        .tag { font-size: 10px; padding: 3px 8px; border-radius: 8px; background: rgba(255,255,255,0.1); font-weight: 600; text-transform: uppercase; }
        
        .list-item { background: var(--bg-card); border: 1px solid var(--card-border); border-radius: 16px; padding: 16px; margin-bottom: 12px; display: flex; align-items: center; justify-content: space-between; backdrop-filter: blur(10px); cursor: pointer; transition: 0.2s; }
        .list-item:active { transform: scale(0.98); }
        .list-info { flex-grow: 1; display: flex; flex-direction: column; gap: 5px; }
        .list-title { font-size: 15px; font-weight: 500; }
        .list-meta { font-size: 12px; color: var(--pink-main); font-weight: 600; display: flex; gap: 10px; }
        
        .checkbox { width: 24px; height: 24px; border-radius: 8px; border: 2px solid var(--text-muted); display: flex; justify-content: center; align-items: center; }
        .list-item.done .checkbox { background: var(--pink-main); border-color: var(--pink-main); box-shadow: 0 0 10px var(--pink-glow); }
        .list-item.done .checkbox i { color: #fff; }
        .list-item.done .list-title { text-decoration: line-through; opacity: 0.5; }

        /* --- CHART --- */
        .chart { background: var(--bg-card); border: 1px solid var(--card-border); border-radius: 20px; padding: 20px; display: flex; align-items: flex-end; justify-content: space-between; height: 130px; margin-top: 10px; }
        .bar { width: 12%; background: rgba(255,255,255,0.05); border-radius: 6px; position: relative; display: flex; justify-content: center; height: 100%; }
        .fill { position: absolute; bottom: 0; width: 100%; background: var(--pink-main); border-radius: 6px; box-shadow: 0 0 10px var(--pink-glow); transition: 1s; }
        .day { position: absolute; bottom: -22px; font-size: 11px; color: var(--text-muted); font-weight: 600;}

        /* --- BOTTOM INPUT & NAV --- */
        .bottom-panel { position: fixed; bottom: 0; left: 0; width: 100%; padding: 10px 20px 25px; background: linear-gradient(0deg, #020203 80%, transparent 100%); display: flex; flex-direction: column; gap: 15px; z-index: 100; }
        .input-bar { display: flex; align-items: center; gap: 10px; background: var(--bg-card); border: 1px solid var(--card-border); border-radius: 25px; padding: 5px 5px 5px 20px; backdrop-filter: blur(15px); }
        .input-bar input { flex-grow: 1; background: transparent; border: none; outline: none; color: white; font-size: 15px; }
        .input-bar input::placeholder { color: var(--text-muted); }
        .add-btn { width: 40px; height: 40px; border-radius: 50%; background: var(--pink-main); color: white; display: flex; justify-content: center; align-items: center; border: none; box-shadow: 0 0 12px var(--pink-glow); cursor: pointer; }
        
        .nav-bar { display: flex; justify-content: space-around; width: 100%; padding-top: 5px; }
        .nav-item { color: var(--text-muted); font-size: 22px; padding: 10px; transition: 0.3s; cursor: pointer; }
        .nav-item.active { color: var(--pink-main); text-shadow: 0 0 15px var(--pink-glow); transform: translateY(-4px); }

        /* --- MODAL (BOTTOM SHEET) --- */
        .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); backdrop-filter: blur(5px); z-index: 999; display: none; opacity: 0; transition: 0.3s; }
        .modal-overlay.active { display: block; opacity: 1; }
        .modal-sheet { position: fixed; bottom: -100%; left: 0; width: 100%; background: var(--bg-modal); border-top: 1px solid var(--card-border); border-radius: 24px 24px 0 0; padding: 25px 20px 40px; z-index: 1000; transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1); box-shadow: 0 -10px 40px rgba(0,0,0,0.5); }
        .modal-sheet.active { bottom: 0; }
        
        .modal-handle { width: 40px; height: 5px; background: rgba(255,255,255,0.2); border-radius: 10px; margin: 0 auto 20px; }
        .modal-title { font-size: 18px; font-weight: 700; margin-bottom: 20px; }
        
        /* Modal Form Elements */
        .form-group { margin-bottom: 15px; }
        .form-label { display: block; font-size: 12px; color: var(--text-muted); margin-bottom: 8px; text-transform: uppercase; font-weight: 600;}
        .form-control { width: 100%; background: rgba(255,255,255,0.05); border: 1px solid var(--card-border); border-radius: 12px; padding: 12px 15px; color: white; font-size: 15px; outline: none; }
        .form-control:focus { border-color: var(--pink-main); }
        textarea.form-control { resize: none; height: 80px; }
        
        .type-selector { display: flex; background: rgba(255,255,255,0.05); border-radius: 12px; padding: 4px; margin-bottom: 20px; }
        .type-btn { flex: 1; text-align: center; padding: 10px; border-radius: 10px; font-size: 14px; font-weight: 600; color: var(--text-muted); transition: 0.3s; cursor: pointer; }
        .type-btn.active { background: var(--pink-main); color: white; box-shadow: 0 0 10px var(--pink-glow); }

        .modal-actions { display: flex; gap: 10px; margin-top: 25px; }
        .btn { flex: 1; padding: 14px; border-radius: 14px; font-size: 15px; font-weight: 700; cursor: pointer; border: none; transition: 0.2s; }
        .btn-primary { background: var(--pink-main); color: white; box-shadow: 0 0 15px var(--pink-glow); }
        .btn-danger { background: rgba(255, 50, 50, 0.2); color: #ff4d4d; border: 1px solid rgba(255, 50, 50, 0.5); }
        .btn-cancel { background: transparent; color: var(--text-main); border: 1px solid var(--card-border); }
        
        #loader { text-align: center; margin-top: 50px; color: var(--pink-main); }

        /* Custom scrollbar for web */
        ::-webkit-scrollbar { width: 0px; }
    </style>
</head>
<body>

    <div class="top-bar">
        <div class="premium-badge">Lunex PRO <i class="fas fa-star"></i></div>
        <img id="userAvatar" class="avatar" src="https://ui-avatars.com/api/?name=AI&background=ff477e&color=fff" alt="Avatar">
    </div>

    <div class="greeting">
        <h1 id="userName">Hi User,</h1>
        <p>Manage your tasks, notes, and schedules in one unified workspace.</p>
    </div>

    <div id="loader"><i class="fas fa-circle-notch fa-spin fa-2x"></i></div>

    <main id="tab-dashboard" class="tab-content active">
        <h2 class="section-title">Weekly Activity</h2>
        <div class="chart">
            <div class="bar"><div class="fill" style="height: 40%;"></div><span class="day">M</span></div>
            <div class="bar"><div class="fill" style="height: 70%;"></div><span class="day">T</span></div>
            <div class="bar"><div class="fill" style="height: 30%;"></div><span class="day">W</span></div>
            <div class="bar"><div class="fill" style="height: 90%;"></div><span class="day">T</span></div>
            <div class="bar"><div class="fill" style="height: 50%;"></div><span class="day">F</span></div>
            <div class="bar"><div class="fill" style="height: 80%;"></div><span class="day">S</span></div>
            <div class="bar"><div class="fill" style="height: 20%; background: var(--card-border); box-shadow: none;"></div><span class="day" style="color:var(--pink-main);">S</span></div>
        </div>

        <h2 class="section-title">Active Reminders</h2>
        <div id="dashReminders"></div>
    </main>

    <main id="tab-notes" class="tab-content">
        <div class="grid-cards" id="notesGrid"></div>
    </main>

    <main id="tab-tasks" class="tab-content">
        <div id="tasksList"></div>
    </main>

    <main id="tab-settings" class="tab-content">
        <div class="list-item" style="flex-direction: column; align-items: flex-start; gap: 15px;">
            <div style="display:flex; align-items:center; gap:15px;">
                <img id="setAvatar" src="" style="width:60px; border-radius:50%; border:2px solid var(--pink-main);">
                <div>
                    <h3 id="setName" style="font-size:18px;">Name</h3>
                    <p style="color:var(--text-muted); font-size:13px;">ID: <span id="setID"></span></p>
                </div>
            </div>
        </div>
        <h2 class="section-title">System Data</h2>
        <div class="list-item" onclick="tg.showAlert('Всего данных: ' + (currentUserData?.notes?.length + currentUserData?.tasks_short?.length) + ' элементов.')">
            <div class="list-info"><span class="list-title"><i class="fas fa-database"></i> Storage Info</span></div>
            <i class="fas fa-chevron-right" style="color:var(--text-muted);"></i>
        </div>
        <div class="list-item" onclick="tg.showAlert('Синхронизация работает в реальном времени!')">
            <div class="list-info"><span class="list-title"><i class="fas fa-sync"></i> Sync Status</span></div>
            <span style="color:var(--pink-main); font-size:12px; font-weight:bold;">ONLINE</span>
        </div>
    </main>

    <div class="bottom-panel">
        <div class="input-bar">
            <input type="text" id="mainInput" placeholder="Add new note or task..." onkeypress="if(event.key === 'Enter') openAddModal()">
            <button class="add-btn" onclick="openAddModal()"><i class="fas fa-plus"></i></button>
        </div>
        <div class="nav-bar">
            <div class="nav-item active" onclick="switchTab('dashboard', this)"><i class="fas fa-home"></i></div>
            <div class="nav-item" onclick="switchTab('notes', this)"><i class="fas fa-border-all"></i></div>
            <div class="nav-item" onclick="switchTab('tasks', this)"><i class="fas fa-check-circle"></i></div>
            <div class="nav-item" onclick="switchTab('settings', this)"><i class="fas fa-cog"></i></div>
        </div>
    </div>

    <div class="modal-overlay" id="modalOverlay" onclick="closeModal()"></div>
    <div class="modal-sheet" id="actionModal">
        <div class="modal-handle"></div>
        <h2 class="modal-title" id="modalTitle">Add New Item</h2>
        
        <div class="type-selector" id="typeSelector">
            <div class="type-btn active" onclick="selectType('note')" id="btnTypeNote">Note</div>
            <div class="type-btn" onclick="selectType('task')" id="btnTypeTask">Reminder</div>
        </div>

        <div class="form-group">
            <label class="form-label">Content</label>
            <textarea class="form-control" id="modalText" placeholder="Write your thoughts or tasks here..."></textarea>
        </div>

        <div class="form-group">
            <label class="form-label">Category</label>
            <select class="form-control" id="modalCategory">
                <option value="Personal">Personal</option>
                <option value="Work">Work</option>
                <option value="Ideas">Ideas</option>
                <option value="Buy">Shopping</option>
            </select>
        </div>

        <div class="form-group" id="dateGroup" style="display: none;">
            <label class="form-label">Date & Time</label>
            <input type="datetime-local" class="form-control" id="modalDate">
        </div>

        <input type="hidden" id="editIndex" value="-1">
        <input type="hidden" id="editOriginalType" value="">

        <div class="modal-actions">
            <button class="btn btn-cancel" onclick="closeModal()">Cancel</button>
            <button class="btn btn-danger" id="btnDelete" style="display:none;" onclick="deleteItem()">Delete</button>
            <button class="btn btn-primary" onclick="saveItem()">Save</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.10.0/firebase-app.js";
        import { getFirestore, doc, onSnapshot, updateDoc } from "https://www.gstatic.com/firebasejs/10.10.0/firebase-firestore.js";

        // 1. INIT TELEGRAM
        const tg = window.Telegram.WebApp;
        tg.expand();
        tg.ready();
        tg.setHeaderColor('#4a0d26');
        tg.setBackgroundColor('#050508');

        let userId = "8562313043"; // Default for testing outside TG
        if (tg.initDataUnsafe.user) {
            userId = tg.initDataUnsafe.user.id.toString();
            const name = tg.initDataUnsafe.user.first_name;
            document.getElementById('userName').innerText = "Hi " + name + ",";
            const avatarUrl = `https://ui-avatars.com/api/?name=${name}&background=ff477e&color=fff&bold=true`;
            document.getElementById('userAvatar').src = avatarUrl;
            document.getElementById('setAvatar').src = avatarUrl;
            document.getElementById('setName').innerText = name;
            document.getElementById('setID').innerText = userId;
        }

        // 2. TAB LOGIC
        window.switchTab = function(tabId, btn) {
            document.querySelectorAll('.tab-content').forEach(t => t.style.display = 'none');
            document.querySelectorAll('.nav-item').forEach(b => b.classList.remove('active'));
            document.getElementById(`tab-${tabId}`).style.display = 'block';
            btn.classList.add('active');
            tg.HapticFeedback.impactOccurred('light');
            window.scrollTo(0,0);
        };
        document.getElementById('tab-dashboard').style.display = 'block';

        // 3. FIREBASE SETUP
        const firebaseConfig = {
            apiKey: "AIzaSyDY8g42qsSkoN36i-DIeptehoDWXSEUlU0",
            authDomain: "lunex-f5362.firebaseapp.com",
            projectId: "lunex-f5362",
            storageBucket: "lunex-f5362.firebasestorage.app",
            messagingSenderId: "364220464927",
            appId: "1:364220464927:web:95531c2ac9de3aaa343a2a"
        };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        window.currentUserData = null;
        const userDocRef = doc(db, "users", userId);

        onSnapshot(userDocRef, (docSnap) => {
            document.getElementById('loader').style.display = 'none';
            if (docSnap.exists()) {
                window.currentUserData = docSnap.data();
                renderUI();
            }
        });

        // 4. PARSER HELPER (Extract Category from strings like "[Work] Do something")
        function parseItem(textObj) {
            let rawText = typeof textObj === 'string' ? textObj : textObj.text || "";
            let category = "Personal";
            let content = rawText;
            const match = rawText.match(/^\[(.*?)\]\s*(.*)/);
            if (match) {
                category = match[1];
                content = match[2];
            }
            return { category, content, rawText };
        }

        // 5. RENDER UI
        function renderUI() {
            const data = window.currentUserData;
            if(!data) return;

            const notes = data.notes || [];
            const reminders = data.reminders || [];
            
            // Render Notes (Grid)
            const nGrid = document.getElementById('notesGrid');
            if(notes.length === 0) nGrid.innerHTML = '<p style="color:var(--text-muted); grid-column: span 2;">No notes yet.</p>';
            else {
                nGrid.innerHTML = notes.map((n, i) => {
                    const parsed = parseItem(n);
                    return `
                    <div class="card" onclick="openEditModal('note', ${i})">
                        <div class="card-text">${parsed.content.length > 70 ? parsed.content.substring(0, 70) + '...' : parsed.content}</div>
                        <div class="card-icon"><span class="tag">${parsed.category}</span> <i class="fas fa-pen" style="font-size:12px; opacity:0.5;"></i></div>
                    </div>`;
                }).join('');
            }

            // Render Tasks/Reminders
            const tList = document.getElementById('tasksList');
            const dReminders = document.getElementById('dashReminders');
            
            if(reminders.length === 0) {
                tList.innerHTML = '<p style="color:var(--text-muted); text-align:center; margin-top:20px;">All clear! ✨</p>';
                dReminders.innerHTML = '<div class="card" style="min-height:auto;"><div class="card-text" style="color:var(--text-muted);">No active timers.</div></div>';
            } else {
                const renderHTML = reminders.map((r, i) => {
                    const parsed = parseItem(r);
                    // Format date
                    const d = new Date(r.datetime);
                    const dateStr = d.toLocaleDateString() + ' ' + d.toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
                    
                    return `
                    <div class="list-item" onclick="openEditModal('task', ${i})">
                        <div class="list-info">
                            <span class="list-title">${parsed.content}</span>
                            <div class="list-meta"><span class="tag">${parsed.category}</span> <span><i class="far fa-clock"></i> ${dateStr}</span></div>
                        </div>
                        <div class="checkbox" onclick="event.stopPropagation(); completeReminder(${i})"><i class="fas fa-check"></i></div>
                    </div>`;
                }).join('');
                tList.innerHTML = renderHTML;
                dReminders.innerHTML = renderHTML; // Mirror to dashboard
            }
        }

        // 6. MODAL LOGIC (BOTTOM SHEET)
        window.currentType = 'note';
        
        window.selectType = function(type) {
            window.currentType = type;
            document.getElementById('btnTypeNote').classList.remove('active');
            document.getElementById('btnTypeTask').classList.remove('active');
            document.getElementById(type === 'note' ? 'btnTypeNote' : 'btnTypeTask').classList.add('active');
            document.getElementById('dateGroup').style.display = type === 'task' ? 'block' : 'none';
            tg.HapticFeedback.impactOccurred('light');
        }

        window.openAddModal = function() {
            tg.HapticFeedback.impactOccurred('medium');
            const inputVal = document.getElementById('mainInput').value;
            
            document.getElementById('modalTitle').innerText = "Add New Item";
            document.getElementById('modalText').value = inputVal;
            document.getElementById('modalCategory').value = "Personal";
            document.getElementById('editIndex').value = "-1";
            document.getElementById('btnDelete').style.display = "none";
            document.getElementById('mainInput').value = ""; // Clear input
            
            // Setup default date for task (tomorrow 10:00)
            const tomorrow = new Date();
            tomorrow.setDate(tomorrow.getDate() + 1);
            tomorrow.setHours(10, 0, 0, 0);
            document.getElementById('modalDate').value = tomorrow.toISOString().slice(0,16);

            selectType('note'); // default
            
            document.getElementById('modalOverlay').classList.add('active');
            document.getElementById('actionModal').classList.add('active');
        }

        window.openEditModal = function(type, index) {
            tg.HapticFeedback.impactOccurred('light');
            const data = window.currentUserData;
            document.getElementById('modalTitle').innerText = "Edit Item";
            document.getElementById('editIndex').value = index;
            document.getElementById('editOriginalType').value = type;
            document.getElementById('btnDelete').style.display = "block";

            if(type === 'note') {
                selectType('note');
                const parsed = parseItem(data.notes[index]);
                document.getElementById('modalText').value = parsed.content;
                document.getElementById('modalCategory').value = parsed.category;
            } else {
                selectType('task');
                const item = data.reminders[index];
                const parsed = parseItem(item);
                document.getElementById('modalText').value = parsed.content;
                document.getElementById('modalCategory').value = parsed.category;
                
                // convert YYYY-MM-DD HH:MM:SS to datetime-local
                if(item.datetime) {
                    const dt = item.datetime.replace(' ', 'T');
                    document.getElementById('modalDate').value = dt.slice(0,16);
                }
            }

            document.getElementById('modalOverlay').classList.add('active');
            document.getElementById('actionModal').classList.add('active');
        }

        window.closeModal = function() {
            document.getElementById('modalOverlay').classList.remove('active');
            document.getElementById('actionModal').classList.remove('active');
        }

        // 7. CRUD OPERATIONS WITH FIREBASE
        window.saveItem = async function() {
            const data = window.currentUserData;
            if(!data) return;

            const text = document.getElementById('modalText').value.trim();
            if(!text) { tg.showAlert("Please enter content."); return; }
            
            const category = document.getElementById('modalCategory').value;
            const formattedText = `[${category}] ${text}`;
            
            const isEdit = document.getElementById('editIndex').value !== "-1";
            const idx = parseInt(document.getElementById('editIndex').value);
            const origType = document.getElementById('editOriginalType').value;

            let updates = {};
            let notes = [...(data.notes || [])];
            let reminders = [...(data.reminders || [])];

            tg.HapticFeedback.impactOccurred('heavy');

            // If editing, remove old item first
            if(isEdit) {
                if(origType === 'note') notes.splice(idx, 1);
                else reminders.splice(idx, 1);
            }

            // Add new/updated item
            if(window.currentType === 'note') {
                notes.push(formattedText);
            } else {
                const dateVal = document.getElementById('modalDate').value;
                if(!dateVal) { tg.showAlert("Select date & time!"); return; }
                const formattedDate = dateVal.replace('T', ' ') + ":00";
                reminders.push({ text: formattedText, datetime: formattedDate });
            }

            updates = { notes, reminders };

            try {
                await updateDoc(userDocRef, updates);
                closeModal();
            } catch (e) {
                console.error(e);
                tg.showAlert("Error saving to database.");
            }
        }

        window.deleteItem = async function() {
            const data = window.currentUserData;
            const idx = parseInt(document.getElementById('editIndex').value);
            const origType = document.getElementById('editOriginalType').value;
            
            tg.showConfirm("Delete this item?", async function(confirm) {
                if(!confirm) return;
                
                let notes = [...(data.notes || [])];
                let reminders = [...(data.reminders || [])];

                if(origType === 'note') notes.splice(idx, 1);
                else reminders.splice(idx, 1);

                try {
                    await updateDoc(userDocRef, { notes, reminders });
                    closeModal();
                    tg.HapticFeedback.impactOccurred('medium');
                } catch (e) {
                    console.error(e);
                }
            });
        }

        window.completeReminder = async function(index) {
            const data = window.currentUserData;
            tg.HapticFeedback.impactOccurred('medium');
            
            // Visual trick
            document.querySelectorAll('#tasksList .list-item')[index].classList.add('done');
            
            let reminders = [...(data.reminders || [])];
            reminders.splice(index, 1); // Delete from DB upon completion

            setTimeout(async () => {
                try { await updateDoc(userDocRef, { reminders }); } 
                catch (e) { console.error(e); }
            }, 300); // slight delay for animation
        }
    </script>
</body>
</html>
