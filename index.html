<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Lunex PRO</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        /* --- DESIGN SYSTEM: ELITE MINIMALISM --- */
        :root {
            --bg-dark: #050508;
            --bg-card: rgba(20, 20, 24, 0.4);
            --bg-modal: rgba(10, 10, 12, 0.98);
            --card-border: rgba(255, 255, 255, 0.05);
            --pink-main: #ff477e;
            --pink-glow: rgba(255, 71, 126, 0.3);
            --text-main: #f0f0f5;
            --text-muted: #8e8e9f;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Segoe UI', Roboto, sans-serif; -webkit-tap-highlight-color: transparent; }

        body {
            background: radial-gradient(circle at 50% -20%, #300a18 0%, var(--bg-dark) 50%);
            background-color: var(--bg-dark);
            color: var(--text-main);
            min-height: 100vh;
            overflow-y: auto;
            overflow-x: hidden;
            padding-bottom: 120px;
            -webkit-overflow-scrolling: touch;
        }

        /* --- TOP BAR (Transparent, 75px padding) --- */
        .top-bar { 
            display: flex; justify-content: space-between; align-items: center; 
            padding: 75px 24px 10px; 
            position: sticky; top: 0; 
            background: transparent; 
            backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px); 
            z-index: 50; 
        }
        .premium-badge { color: var(--text-muted); font-size: 11px; font-weight: 500; letter-spacing: 2px; text-transform: uppercase; display: flex; align-items: center; gap: 8px; }
        .premium-badge span { width: 6px; height: 6px; background: var(--pink-main); border-radius: 50%; box-shadow: 0 0 10px var(--pink-main); }
        .avatar { width: 38px; height: 38px; border-radius: 50%; object-fit: cover; border: 1px solid var(--card-border); }

        /* --- DYNAMIC GREETING --- */
        .greeting { padding: 20px 24px 30px; }
        .greeting h1 { font-size: 26px; font-weight: 400; letter-spacing: -0.5px; margin-bottom: 4px; }
        .greeting p { font-size: 13px; color: var(--text-muted); font-weight: 400; letter-spacing: 0.5px; text-transform: uppercase; }

        /* --- TABS --- */
        .tab-content { display: none; animation: fadeIn 0.4s cubic-bezier(0.16, 1, 0.3, 1); padding: 0 20px 20px; }
        .tab-content.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }

        /* --- UI COMPONENTS --- */
        .section-title { font-size: 11px; font-weight: 500; color: var(--text-muted); margin: 30px 0 15px; text-transform: uppercase; letter-spacing: 2px; }
        
        .grid-cards { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        .card { background: var(--bg-card); border: 1px solid var(--card-border); border-radius: 16px; padding: 18px; min-height: 130px; display: flex; flex-direction: column; justify-content: space-between; backdrop-filter: blur(10px); transition: 0.3s; cursor: pointer; }
        .card:active { transform: scale(0.97); background: rgba(255,255,255,0.03); }
        .card-text { font-size: 14px; font-weight: 400; line-height: 1.5; color: var(--text-main); word-wrap: break-word; }
        .card-footer { display: flex; justify-content: space-between; align-items: center; margin-top: 15px; }
        .tag { font-size: 9px; padding: 4px 10px; border-radius: 20px; font-weight: 500; text-transform: uppercase; letter-spacing: 1px; color: #fff; }
        
        .list-item { background: var(--bg-card); border: 1px solid var(--card-border); border-radius: 16px; padding: 18px; margin-bottom: 10px; display: flex; align-items: center; justify-content: space-between; backdrop-filter: blur(10px); cursor: pointer; transition: 0.2s; }
        .list-item:active { transform: scale(0.98); }
        .list-info { flex-grow: 1; display: flex; flex-direction: column; gap: 6px; }
        .list-title { font-size: 15px; font-weight: 400; letter-spacing: -0.2px; }
        .list-meta { font-size: 11px; color: var(--text-muted); display: flex; gap: 12px; align-items: center; }
        
        .checkbox { width: 22px; height: 22px; border-radius: 50%; border: 1px solid var(--text-muted); display: flex; justify-content: center; align-items: center; transition: 0.3s; }
        .list-item.done .checkbox { background: var(--pink-main); border-color: var(--pink-main); box-shadow: 0 0 10px var(--pink-glow); }
        .list-item.done .checkbox i { color: #fff; font-size: 10px; opacity: 1; }
        .checkbox i { opacity: 0; }
        .list-item.done .list-title { text-decoration: line-through; color: var(--text-muted); }

        /* --- CHART --- */
        .chart { background: var(--bg-card); border: 1px solid var(--card-border); border-radius: 16px; padding: 25px 20px 30px; display: flex; align-items: flex-end; justify-content: space-between; height: 160px; }
        .bar { width: 8%; background: rgba(255,255,255,0.03); border-radius: 10px; position: relative; display: flex; justify-content: center; height: 100%; }
        .fill { position: absolute; bottom: 0; width: 100%; background: var(--text-muted); border-radius: 10px; transition: height 1s cubic-bezier(0.16, 1, 0.3, 1); height: 0%; }
        .bar.today .fill { background: var(--pink-main); box-shadow: 0 0 15px var(--pink-glow); }
        .day { position: absolute; bottom: -25px; font-size: 10px; color: var(--text-muted); font-weight: 500; text-transform: uppercase;}
        .bar.today .day { color: var(--text-main); }

        /* --- SEARCH & FILTERS --- */
        .search-bar { background: var(--bg-card); border: 1px solid var(--card-border); border-radius: 12px; padding: 12px 16px; display: flex; align-items: center; gap: 10px; margin-bottom: 20px; backdrop-filter: blur(10px); }
        .search-bar input { background: transparent; border: none; outline: none; color: white; font-size: 14px; width: 100%; }
        .search-bar input::placeholder { color: var(--text-muted); }
        
        .filter-tabs { display: flex; gap: 10px; margin-bottom: 20px; }
        .filter-btn { background: transparent; border: 1px solid var(--card-border); color: var(--text-muted); padding: 6px 16px; border-radius: 20px; font-size: 12px; transition: 0.3s; }
        .filter-btn.active { background: #fff; color: #000; border-color: #fff; }

        /* --- ELITE BOTTOM NAV (With Center FAB) --- */
        .bottom-panel { position: fixed; bottom: 0; left: 0; width: 100%; padding: 0 0 25px; background: linear-gradient(0deg, var(--bg-dark) 70%, transparent 100%); z-index: 100; display: flex; justify-content: center; }
        .nav-bar { display: flex; justify-content: space-between; align-items: center; width: 90%; background: var(--bg-modal); border: 1px solid var(--card-border); border-radius: 30px; padding: 8px 25px; backdrop-filter: blur(20px); box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .nav-item { color: var(--text-muted); font-size: 18px; padding: 10px; transition: 0.3s; cursor: pointer; }
        .nav-item.active { color: var(--text-main); }
        .fab-btn { width: 46px; height: 46px; border-radius: 50%; background: var(--pink-main); color: white; display: flex; justify-content: center; align-items: center; border: none; box-shadow: 0 4px 15px var(--pink-glow); cursor: pointer; font-size: 16px; transition: transform 0.2s; }
        .fab-btn:active { transform: scale(0.9); }

        /* --- MODAL (BOTTOM SHEET) --- */
        .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.8); backdrop-filter: blur(8px); z-index: 999; display: none; opacity: 0; transition: 0.3s; }
        .modal-overlay.active { display: block; opacity: 1; }
        .modal-sheet { position: fixed; bottom: -100%; left: 0; width: 100%; background: var(--bg-modal); border-top: 1px solid var(--card-border); border-radius: 24px 24px 0 0; padding: 20px 24px 40px; z-index: 1000; transition: 0.4s cubic-bezier(0.16, 1, 0.3, 1); }
        .modal-sheet.active { bottom: 0; }
        
        .modal-handle { width: 36px; height: 4px; background: rgba(255,255,255,0.1); border-radius: 10px; margin: 0 auto 25px; }
        
        .form-group { margin-bottom: 25px; }
        .form-control { width: 100%; background: transparent; border: none; border-bottom: 1px solid var(--card-border); padding: 10px 0; color: white; font-size: 16px; outline: none; transition: 0.3s; }
        .form-control:focus { border-color: var(--pink-main); }
        textarea.form-control { resize: none; height: 40px; }
        
        .tags-container { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 15px; }
        .tag-pill { padding: 6px 14px; border-radius: 20px; background: transparent; border: 1px solid var(--text-muted); color: var(--text-muted); font-size: 11px; letter-spacing: 1px; text-transform: uppercase; cursor: pointer; transition: 0.2s; }
        .tag-pill.selected { border-color: var(--pink-main); color: var(--pink-main); }
        .tag-custom-input { display: none; width: 100%; background: transparent; border: none; border-bottom: 1px solid var(--pink-main); color: white; padding: 5px 0; margin-top: 10px; font-size: 13px; outline: none; }

        .type-selector { display: flex; gap: 20px; margin-bottom: 25px; border-bottom: 1px solid var(--card-border); padding-bottom: 15px; }
        .type-btn { font-size: 13px; font-weight: 500; color: var(--text-muted); text-transform: uppercase; letter-spacing: 1px; cursor: pointer; transition: 0.3s; }
        .type-btn.active { color: var(--text-main); }

        .modal-actions { display: flex; justify-content: flex-end; gap: 15px; margin-top: 30px; }
        .btn { padding: 0; background: transparent; border: none; font-size: 14px; font-weight: 500; text-transform: uppercase; letter-spacing: 1px; cursor: pointer; transition: 0.2s; }
        .btn-primary { color: var(--pink-main); }
        .btn-danger { color: #ff4d4d; margin-right: auto; }
        .btn-cancel { color: var(--text-muted); }

        ::-webkit-scrollbar { width: 0px; }
        .empty-state { text-align: center; color: var(--text-muted); font-size: 13px; margin-top: 40px; letter-spacing: 0.5px; }
    </style>
</head>
<body>

    <div class="top-bar">
        <div class="premium-badge"><span></span> LUNEX OS</div>
        <img id="userAvatar" class="avatar" src="" alt="">
    </div>

    <main id="tab-dashboard" class="tab-content active">
        <div class="greeting">
            <h1 id="dynamicGreeting">Welcome</h1>
            <p id="currentDate">Loading date...</p>
        </div>

        <h2 class="section-title">Activity Flow</h2>
        <div class="chart" id="activityChart"></div>

        <h2 class="section-title">Upcoming</h2>
        <div id="dashReminders"></div>
    </main>

    <main id="tab-notes" class="tab-content">
        <div class="greeting" style="padding-bottom: 15px;">
            <h1>Vault</h1>
            <p>Knowledge Base</p>
        </div>
        
        <div class="search-bar">
            <i class="fas fa-search" style="color: var(--text-muted); font-size: 12px;"></i>
            <input type="text" id="searchInput" placeholder="Search records..." oninput="filterNotes()">
        </div>

        <div class="grid-cards" id="notesGrid"></div>
    </main>

    <main id="tab-tasks" class="tab-content">
        <div class="greeting" style="padding-bottom: 15px;">
            <h1>Agenda</h1>
            <p>Action Items</p>
        </div>

        <div class="filter-tabs">
            <div class="filter-btn active" id="fltAll" onclick="setTaskFilter('all')">All</div>
            <div class="filter-btn" id="fltToday" onclick="setTaskFilter('today')">Today</div>
        </div>

        <div id="tasksList"></div>
    </main>

    <main id="tab-settings" class="tab-content">
        <div class="greeting">
            <h1>Preferences</h1>
            <p>System Configuration</p>
        </div>
        
        <div class="list-item" style="border: none; background: transparent; padding: 0 0 20px;">
            <img id="setAvatar" src="" style="width:50px; height:50px; border-radius:50%; object-fit: cover; margin-right: 15px;">
            <div class="list-info">
                <span class="list-title" id="setName">Name</span>
                <span class="list-meta" id="setID">ID</span>
            </div>
        </div>

        <h2 class="section-title">Storage</h2>
        <div class="list-item">
            <span class="list-title">Database Records</span>
            <span style="font-size:12px; color:var(--text-muted);" id="dbItemCount">0</span>
        </div>
        <div class="list-item">
            <span class="list-title">Live Sync</span>
            <span style="font-size:10px; letter-spacing:1px; color:#fff; background:var(--pink-main); padding: 3px 8px; border-radius: 10px;">ACTIVE</span>
        </div>
    </main>

    <div class="bottom-panel">
        <div class="nav-bar">
            <div class="nav-item active" onclick="switchTab('dashboard', this)"><i class="fas fa-layer-group"></i></div>
            <div class="nav-item" onclick="switchTab('notes', this)"><i class="fas fa-folder-open"></i></div>
            
            <button class="fab-btn" onclick="openAddModal()"><i class="fas fa-plus"></i></button>
            
            <div class="nav-item" onclick="switchTab('tasks', this)"><i class="fas fa-check"></i></div>
            <div class="nav-item" onclick="switchTab('settings', this)"><i class="fas fa-sliders-h"></i></div>
        </div>
    </div>

    <div class="modal-overlay" id="modalOverlay" onclick="closeModal()"></div>
    <div class="modal-sheet" id="actionModal">
        <div class="modal-handle"></div>
        
        <div class="type-selector" id="typeSelector">
            <div class="type-btn active" onclick="selectType('note')" id="btnTypeNote">Record</div>
            <div class="type-btn" onclick="selectType('task')" id="btnTypeTask">Agenda</div>
        </div>

        <div class="form-group">
            <textarea class="form-control" id="modalText" placeholder="Start typing..."></textarea>
        </div>

        <div class="form-group" id="dateGroup" style="display: none;">
            <input type="datetime-local" class="form-control" id="modalDate" style="color: var(--text-muted);">
        </div>

        <div class="form-group">
            <div class="tags-container" id="tagsContainer"></div>
            <input type="text" id="customTagInput" class="tag-custom-input" placeholder="Type custom tag..." oninput="updateCustomTagSelection()">
        </div>

        <input type="hidden" id="editIndex" value="-1">
        <input type="hidden" id="editOriginalType" value="">
        <input type="hidden" id="selectedTag" value="Personal">

        <div class="modal-actions">
            <button class="btn btn-danger" id="btnDelete" style="display:none;" onclick="deleteItem()">Delete</button>
            <button class="btn btn-cancel" onclick="closeModal()">Cancel</button>
            <button class="btn btn-primary" onclick="saveItem()">Save</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.10.0/firebase-app.js";
        import { getFirestore, doc, onSnapshot, updateDoc } from "https://www.gstatic.com/firebasejs/10.10.0/firebase-firestore.js";

        const tg = window.Telegram.WebApp;
        tg.expand();
        if (tg.requestFullscreen) { tg.requestFullscreen(); }

        let userId = "8562313043"; 
        let userName = "User";

        if (tg.initDataUnsafe?.user) {
            userId = tg.initDataUnsafe.user.id.toString();
            userName = tg.initDataUnsafe.user.first_name;
            document.getElementById('setName').innerText = userName;
            document.getElementById('setID').innerText = userId;
            
            let avatarUrl = `https://ui-avatars.com/api/?name=${userName}&background=202024&color=fff`;
            if (tg.initDataUnsafe.user.photo_url) avatarUrl = tg.initDataUnsafe.user.photo_url;
            
            document.getElementById('userAvatar').src = avatarUrl;
            document.getElementById('setAvatar').src = avatarUrl;
        }

        // Feature 2: Dynamic Greeting & Date
        function setGreeting() {
            const hour = new Date().getHours();
            let greeting = "Good evening";
            if (hour >= 5 && hour < 12) greeting = "Good morning";
            else if (hour >= 12 && hour < 18) greeting = "Good afternoon";
            
            document.getElementById('dynamicGreeting').innerText = `${greeting}, ${userName}.`;
            
            const options = { weekday: 'long', month: 'long', day: 'numeric' };
            document.getElementById('currentDate').innerText = new Date().toLocaleDateString('en-US', options);
        }
        setGreeting();

        window.switchTab = function(tabId, btn) {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(b => b.classList.remove('active'));
            document.getElementById(`tab-${tabId}`).classList.add('active');
            btn.classList.add('active');
            tg.HapticFeedback.impactOccurred('light');
            window.scrollTo(0,0);
        };

        const firebaseConfig = {
            apiKey: "AIzaSyDY8g42qsSkoN36i-DIeptehoDWXSEUlU0",
            authDomain: "lunex-f5362.firebaseapp.com",
            projectId: "lunex-f5362",
            storageBucket: "lunex-f5362.firebasestorage.app",
            messagingSenderId: "364220464927",
            appId: "1:364220464927:web:95531c2ac9de3aaa343a2a"
        };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        window.currentUserData = null;
        const userDocRef = doc(db, "users", userId);

        onSnapshot(userDocRef, (docSnap) => {
            if (docSnap.exists()) {
                window.currentUserData = docSnap.data();
                renderUI();
                renderChart();
            }
        });

        const defaultTags = ['Personal', 'Work', 'Finance'];
        function getTagColor(tag) {
            const predefined = { 'Personal': '#ff477e', 'Work': '#a0a0b0', 'Finance': '#ffffff' };
            if(predefined[tag]) return predefined[tag];
            return '#a0a0b0'; // Minimalist fallback
        }

        function parseItem(rawText) {
            let category = "Draft";
            let content = rawText;
            const match = rawText.match(/^\[(.*?)\]\s*(.*)/);
            if (match) { category = match[1]; content = match[2]; }
            return { category, content, rawText };
        }

        window.currentTaskFilter = 'all';
        window.setTaskFilter = function(filter) {
            window.currentTaskFilter = filter;
            document.getElementById('fltAll').classList.remove('active');
            document.getElementById('fltToday').classList.remove('active');
            document.getElementById(filter === 'all' ? 'fltAll' : 'fltToday').classList.add('active');
            tg.HapticFeedback.impactOccurred('light');
            renderUI();
        }

        window.filterNotes = function() { renderUI(); }

        function renderUI() {
            const data = window.currentUserData;
            if(!data) return;

            const notes = data.notes || [];
            let reminders = data.reminders || [];
            
            document.getElementById('dbItemCount').innerText = `${notes.length + reminders.length}`;

            // Feature 3: Live Search in Notes
            const searchTerm = document.getElementById('searchInput').value.toLowerCase();
            const nGrid = document.getElementById('notesGrid');
            
            const filteredNotes = notes.map((n, i) => ({ text: n, origIndex: i }))
                                     .filter(n => n.text.toLowerCase().includes(searchTerm));

            if(filteredNotes.length === 0) nGrid.innerHTML = '<p class="empty-state" style="grid-column: span 2;">No records found.</p>';
            else {
                nGrid.innerHTML = filteredNotes.map(nObj => {
                    const parsed = parseItem(nObj.text);
                    const tCol = getTagColor(parsed.category);
                    return `
                    <div class="card" onclick="openEditModal('note', ${nObj.origIndex})">
                        <div class="card-text">${parsed.content.length > 70 ? parsed.content.substring(0, 70) + '...' : parsed.content}</div>
                        <div class="card-footer">
                            <span class="tag" style="background: rgba(255,255,255,0.05); color: ${tCol};">${parsed.category}</span>
                        </div>
                    </div>`;
                }).join('');
            }

            // Feature 4: Smart Filters in Agenda
            const tList = document.getElementById('tasksList');
            const dReminders = document.getElementById('dashReminders');
            
            const todayStr = new Date().toLocaleDateString();
            
            if(window.currentTaskFilter === 'today') {
                reminders = reminders.filter(r => new Date(r.datetime.replace(' ', 'T')).toLocaleDateString() === todayStr);
            }

            if(reminders.length === 0) {
                tList.innerHTML = '<p class="empty-state">No pending agenda.</p>';
                dReminders.innerHTML = '<p class="empty-state">Clear schedule.</p>';
            } else {
                const renderHTML = reminders.map((r, i) => {
                    const parsed = parseItem(r.text);
                    const d = new Date(r.datetime.replace(' ', 'T'));
                    const dateStr = d.toLocaleDateString([], {month:'short', day:'numeric'}) + ', ' + d.toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
                    
                    return `
                    <div class="list-item" onclick="openEditModal('task', ${i})">
                        <div class="list-info">
                            <span class="list-title">${parsed.content}</span>
                            <div class="list-meta">
                                <span>${parsed.category}</span> • <span>${dateStr}</span>
                            </div>
                        </div>
                        <div class="checkbox" onclick="event.stopPropagation(); completeReminder(${i})"><i class="fas fa-check"></i></div>
                    </div>`;
                }).join('');
                tList.innerHTML = renderHTML;
                if(window.currentTaskFilter === 'all') dReminders.innerHTML = renderHTML; 
            }
        }

        function renderChart() {
            const data = window.currentUserData;
            const reminders = data?.reminders || [];
            const today = new Date();
            today.setHours(0,0,0,0);
            let days = []; let counts = [0,0,0,0,0,0,0];

            for(let i=0; i<7; i++) {
                let d = new Date(today); d.setDate(d.getDate() + i);
                days.push(d.toLocaleDateString('en-US', {weekday: 'short'}).charAt(0));
            }

            reminders.forEach(r => {
                let rd = new Date(r.datetime.replace(' ', 'T')); rd.setHours(0,0,0,0);
                let diffDays = Math.ceil((rd - today) / (1000 * 60 * 60 * 24));
                if(diffDays >= 0 && diffDays < 7) counts[diffDays]++;
            });

            const maxCount = Math.max(...counts, 1);
            document.getElementById('activityChart').innerHTML = days.map((day, i) => {
                let heightPct = (counts[i] / maxCount) * 100;
                if(heightPct < 5 && counts[i] > 0) heightPct = 15; 
                let isToday = i === 0 ? 'today' : '';
                return `<div class="bar ${isToday}"><div class="fill" style="height: ${heightPct}%;"></div><span class="day">${day}</span></div>`;
            }).join('');
        }

        window.currentType = 'note';
        window.selectType = function(type) {
            window.currentType = type;
            document.getElementById('btnTypeNote').classList.remove('active');
            document.getElementById('btnTypeTask').classList.remove('active');
            document.getElementById(type === 'note' ? 'btnTypeNote' : 'btnTypeTask').classList.add('active');
            document.getElementById('dateGroup').style.display = type === 'task' ? 'block' : 'none';
            tg.HapticFeedback.impactOccurred('light');
        }

        window.buildTagsUI = function(selected) {
            document.getElementById('selectedTag').value = selected;
            const container = document.getElementById('tagsContainer');
            
            let html = defaultTags.map(tag => {
                const isSel = tag === selected ? 'selected' : '';
                return `<div class="tag-pill ${isSel}" onclick="buildTagsUI('${tag}')">${tag}</div>`;
            }).join('');
            html += `<div class="tag-pill" style="border-style: dashed;" onclick="toggleCustomTagInput()">+ CUSTOM</div>`;
            container.innerHTML = html;
        }

        window.toggleCustomTagInput = function() {
            const inp = document.getElementById('customTagInput');
            inp.style.display = 'block'; inp.focus();
        }
        window.updateCustomTagSelection = function() {
            const val = document.getElementById('customTagInput').value.trim();
            if(val) document.getElementById('selectedTag').value = val;
        }

        // Feature 1: FAB triggers add modal directly
        window.openAddModal = function() {
            tg.HapticFeedback.impactOccurred('medium');
            document.getElementById('modalText').value = "";
            document.getElementById('editIndex').value = "-1";
            document.getElementById('btnDelete').style.display = "none";
            document.getElementById('customTagInput').style.display = 'none';
            document.getElementById('customTagInput').value = "";
            
            buildTagsUI('Personal');
            
            const tomorrow = new Date(); tomorrow.setDate(tomorrow.getDate() + 1); tomorrow.setHours(10, 0, 0, 0);
            const offset = tomorrow.getTimezoneOffset() * 60000;
            document.getElementById('modalDate').value = (new Date(tomorrow - offset)).toISOString().slice(0, 16);

            selectType('note');
            document.getElementById('modalOverlay').classList.add('active');
            document.getElementById('actionModal').classList.add('active');
        }

        window.openEditModal = function(type, index) {
            tg.HapticFeedback.impactOccurred('light');
            const data = window.currentUserData;
            document.getElementById('editIndex').value = index;
            document.getElementById('editOriginalType').value = type;
            document.getElementById('btnDelete').style.display = "block";
            document.getElementById('customTagInput').style.display = 'none';

            let parsed;
            if(type === 'note') {
                selectType('note');
                parsed = parseItem(data.notes[index]);
            } else {
                selectType('task');
                const item = data.reminders[index];
                parsed = parseItem(item.text);
                if(item.datetime) {
                    const dt = new Date(item.datetime.replace(' ', 'T'));
                    const offset = dt.getTimezoneOffset() * 60000;
                    document.getElementById('modalDate').value = (new Date(dt - offset)).toISOString().slice(0, 16);
                }
            }

            document.getElementById('modalText').value = parsed.content;
            
            if(!defaultTags.includes(parsed.category)) {
                buildTagsUI(''); toggleCustomTagInput();
                document.getElementById('customTagInput').value = parsed.category;
                document.getElementById('selectedTag').value = parsed.category;
            } else buildTagsUI(parsed.category);

            document.getElementById('modalOverlay').classList.add('active');
            document.getElementById('actionModal').classList.add('active');
        }

        window.closeModal = function() {
            document.getElementById('modalOverlay').classList.remove('active');
            document.getElementById('actionModal').classList.remove('active');
        }

        window.saveItem = async function() {
            const data = window.currentUserData; if(!data) return;
            const text = document.getElementById('modalText').value.trim();
            if(!text) return;
            
            const category = document.getElementById('selectedTag').value || 'Draft';
            const formattedText = `[${category}] ${text}`;
            
            const isEdit = document.getElementById('editIndex').value !== "-1";
            const idx = parseInt(document.getElementById('editIndex').value);
            const origType = document.getElementById('editOriginalType').value;

            let notes = [...(data.notes || [])]; let reminders = [...(data.reminders || [])];
            tg.HapticFeedback.impactOccurred('heavy');

            if(isEdit) { if(origType === 'note') notes.splice(idx, 1); else reminders.splice(idx, 1); }

            if(window.currentType === 'note') notes.unshift(formattedText); // Add to top
            else {
                const dateVal = document.getElementById('modalDate').value;
                if(!dateVal) return;
                reminders.push({ text: formattedText, datetime: dateVal.replace('T', ' ') + ":00" });
            }

            await updateDoc(userDocRef, { notes, reminders });
            closeModal();
        }

        window.deleteItem = async function() {
            const data = window.currentUserData;
            const idx = parseInt(document.getElementById('editIndex').value);
            const origType = document.getElementById('editOriginalType').value;
            
            tg.showConfirm("Remove this record permanently?", async function(confirm) {
                if(!confirm) return;
                let notes = [...(data.notes || [])]; let reminders = [...(data.reminders || [])];
                if(origType === 'note') notes.splice(idx, 1); else reminders.splice(idx, 1);
                await updateDoc(userDocRef, { notes, reminders });
                closeModal();
                tg.HapticFeedback.impactOccurred('medium');
            });
        }

        window.completeReminder = async function(index) {
            const data = window.currentUserData;
            tg.HapticFeedback.impactOccurred('medium');
            document.querySelectorAll('#tasksList .list-item')[index].classList.add('done');
            let reminders = [...(data.reminders || [])];
            reminders.splice(index, 1);
            setTimeout(async () => { await updateDoc(userDocRef, { reminders }); }, 300);
        }
    </script>
</body>
</html>
