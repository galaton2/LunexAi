<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>LUNEX // TERMINAL</title>
    
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap" rel="stylesheet">

    <style>
        /* --- ТЕРМИНАЛЬНЫЙ СТИЛЬ (CRT) --- */
        :root {
            --term-bg: #020a02;
            --term-green: #39ff14;
            --term-dark-green: #0a220a;
            --term-dim: #1c521c;
            --glow: 0 0 8px rgba(57, 255, 20, 0.4);
        }

        * {
            margin: 0; padding: 0; box-sizing: border-box;
            font-family: 'Share Tech Mono', monospace;
            user-select: none; /* App-like: запрет выделения текста */
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: var(--term-bg);
            color: var(--term-green);
            overflow: hidden; /* App-like: запрет скролла всей страницы */
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* Эффект старого монитора (CRT Scanlines) */
        body::before {
            content: " "; display: block; position: fixed; top: 0; left: 0; bottom: 0; right: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), 
                        linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06));
            z-index: 999; background-size: 100% 2px, 3px 100%; pointer-events: none;
        }

        /* --- UI ЭЛЕМЕНТЫ --- */
        .header {
            padding: 20px 15px 15px;
            border-bottom: 1px solid var(--term-green);
            box-shadow: 0 2px 10px rgba(57, 255, 20, 0.1);
            display: flex; justify-content: space-between; align-items: center;
            background: var(--term-bg);
            z-index: 10;
        }

        .sys-info h1 { font-size: 20px; text-transform: uppercase; text-shadow: var(--glow); letter-spacing: 1px; }
        .sys-info p { font-size: 12px; color: var(--term-dim); margin-top: 5px; }
        .status-blink { animation: blink 1s step-end infinite; }
        @keyframes blink { 50% { opacity: 0; } }

        /* Контейнер для вкладок (Скроллится только он) */
        .main-container {
            flex: 1;
            overflow-y: auto;
            padding: 15px;
            padding-bottom: 90px;
        }
        /* Скрываем скроллбар для красоты */
        .main-container::-webkit-scrollbar { display: none; }

        .tab-content { display: none; animation: bootUp 0.3s ease-out; }
        .tab-content.active { display: block; }
        @keyframes bootUp { from { opacity: 0; transform: scaleY(0.95); } to { opacity: 1; transform: scaleY(1); } }

        /* --- БЛОКИ И СПИСКИ --- */
        .terminal-block {
            border: 1px solid var(--term-dim);
            background: rgba(10, 34, 10, 0.4);
            padding: 15px;
            margin-bottom: 15px;
            position: relative;
        }
        .terminal-block::before {
            content: ''; position: absolute; top: 0; left: 0; width: 5px; height: 10px; background: var(--term-green);
        }

        .block-title { font-size: 14px; text-transform: uppercase; color: var(--term-dim); margin-bottom: 10px; border-bottom: 1px dashed var(--term-dim); padding-bottom: 5px;}

        .list-item {
            display: flex; align-items: flex-start; gap: 12px;
            padding: 12px 0; border-bottom: 1px solid rgba(57, 255, 20, 0.1);
        }
        .list-item:last-child { border-bottom: none; }
        
        .item-text { flex: 1; font-size: 15px; line-height: 1.4; text-shadow: 0 0 2px rgba(57, 255, 20, 0.3); }
        .item-subtext { font-size: 11px; color: var(--term-dim); margin-top: 4px; }

        /* Хакерский чекбокс */
        .cmd-checkbox {
            width: 20px; height: 20px; border: 1px solid var(--term-green); 
            display: flex; justify-content: center; align-items: center;
            cursor: pointer; background: var(--term-bg);
            transition: all 0.2s;
        }
        .cmd-checkbox.active { background: var(--term-green); color: var(--term-bg); box-shadow: var(--glow); }

        /* --- НАВИГАЦИЯ --- */
        .bottom-nav {
            position: fixed; bottom: 0; left: 0; width: 100%;
            background: var(--term-bg);
            border-top: 1px solid var(--term-green);
            display: flex; justify-content: space-around;
            padding: 10px 0 25px; z-index: 100;
        }
        .nav-btn {
            display: flex; flex-direction: column; align-items: center; gap: 6px;
            color: var(--term-dim); font-size: 12px; cursor: pointer; text-transform: uppercase;
        }
        .nav-btn.active { color: var(--term-green); text-shadow: var(--glow); }
        .nav-btn i { font-size: 18px; }

    </style>
</head>
<body>

    <header class="header">
        <div class="sys-info">
            <h1 id="userName">SYS.ADMIN // LUNEX</h1>
            <p>STATUS: <span style="color: var(--term-green);">ONLINE</span> <span class="status-blink">_</span></p>
        </div>
        <i class="fas fa-satellite-dish" style="font-size: 24px; text-shadow: var(--glow);"></i>
    </header>

    <div class="main-container">
        
        <main id="tab-dashboard" class="tab-content active">
            <div class="terminal-block">
                <div class="block-title">SYSTEM.STATS</div>
                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
                    <div>PROCESSES (TASKS): <br><span id="statTasks" style="font-size: 24px; text-shadow: var(--glow);">0</span></div>
                    <div>MEMORY (NOTES): <br><span id="statNotes" style="font-size: 24px; text-shadow: var(--glow);">0</span></div>
                </div>
            </div>

            <div class="terminal-block">
                <div class="block-title">ACTIVE.TIMERS</div>
                <div id="remindersList">Загрузка данных из БД...</div>
            </div>
        </main>

        <main id="tab-tasks" class="tab-content">
            <div class="terminal-block">
                <div class="block-title">EXECUTE.TASKS (SHORT)</div>
                <div id="tasksList">Загрузка данных из БД...</div>
            </div>

            <div class="terminal-block">
                <div class="block-title">GLOBAL.TARGETS (LONG)</div>
                <div id="goalsList">Загрузка данных из БД...</div>
            </div>
        </main>

        <main id="tab-notes" class="tab-content">
            <div class="terminal-block">
                <div class="block-title">DATA.STORAGE (NOTES)</div>
                <div id="notesList">Загрузка данных из БД...</div>
            </div>
        </main>

    </div>

    <nav class="bottom-nav">
        <div class="nav-btn active" onclick="switchTab('dashboard', this)">
            <i class="fas fa-terminal"></i><span>Dashboard</span>
        </div>
        <div class="nav-btn" onclick="switchTab('tasks', this)">
            <i class="fas fa-list-check"></i><span>Tasks</span>
        </div>
        <div class="nav-btn" onclick="switchTab('notes', this)">
            <i class="fas fa-database"></i><span>Memory</span>
        </div>
    </nav>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getFirestore, doc, onSnapshot, updateDoc } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";

        // ТВОЙ КОНФИГ FIREBASE
        const firebaseConfig = {
            apiKey: "AIzaSyDY8g42qsSkoN36i-DIeptehoDWXSEUlU0",
            authDomain: "lunex-f5362.firebaseapp.com",
            projectId: "lunex-f5362",
            storageBucket: "lunex-f5362.firebasestorage.app",
            messagingSenderId: "364220464927",
            appId: "1:364220464927:web:95531c2ac9de3aaa343a2a"
        };

        // Инициализация
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // Telegram API
        const tg = window.Telegram.WebApp;
        tg.expand();
        tg.setHeaderColor('#020a02');
        tg.setBackgroundColor('#020a02');

        // Получаем ID пользователя (Заглушка для тестов в браузере)
        const userId = tg.initDataUnsafe?.user?.id || "8562313043"; // Подставил твой ID из логов как fallback
        const userName = tg.initDataUnsafe?.user?.username || "GUEST";
        
        document.getElementById('userName').innerText = `USER // ${userName}`;

        // Ссылка на документ юзера
        const userDocRef = doc(db, "users", String(userId));
        let currentUserData = {}; // Глобальное хранилище текущих данных

        // --- РЕАЛТАЙМ СЛУШАТЕЛЬ БАЗЫ (Магия тут) ---
        onSnapshot(userDocRef, (docSnap) => {
            if (docSnap.exists()) {
                currentUserData = docSnap.data();
                renderUI(currentUserData);
            } else {
                // Если юзер только запустил бота и дока еще нет
                document.getElementById('tasksList').innerHTML = "<div class='item-text'>> БАЗА ДАННЫХ ПУСТА. НАПИШИ БОТУ.</div>";
            }
        });

        // --- ФУНКЦИИ РЕНДЕРА ---
        function renderUI(data) {
            // Задачи
            const tasks = data.tasks_short || [];
            document.getElementById('statTasks').innerText = tasks.length;
            if(tasks.length > 0) {
                document.getElementById('tasksList').innerHTML = tasks.map((task, index) => `
                    <div class="list-item">
                        <div class="cmd-checkbox" onclick="window.completeTask('${task}')"><i class="fas fa-xmark" style="opacity:0"></i></div>
                        <div class="item-text">> ${task}</div>
                    </div>
                `).join('');
            } else {
                document.getElementById('tasksList').innerHTML = "<div class='item-text'>> НЕТ АКТИВНЫХ ЗАДАЧ.</div>";
            }

            // Заметки
            const notes = data.notes || [];
            document.getElementById('statNotes').innerText = notes.length;
            if(notes.length > 0) {
                document.getElementById('notesList').innerHTML = notes.map(note => `
                    <div class="list-item"><div class="item-text">${note}</div></div>
                `).join('');
            } else {
                document.getElementById('notesList').innerHTML = "<div class='item-text'>> ПАМЯТЬ ПУСТА.</div>";
            }

            // Напоминания (Таймеры)
            const reminders = data.reminders || [];
            if(reminders.length > 0) {
                document.getElementById('remindersList').innerHTML = reminders.map(rem => `
                    <div class="list-item">
                        <div class="item-text">
                            [EXECUTE] ${rem.text}
                            <div class="item-subtext">TIME: ${rem.datetime || 'UNKNOWN'}</div>
                        </div>
                    </div>
                `).join('');
            } else {
                document.getElementById('remindersList').innerHTML = "<div class='item-text'>> НЕТ АКТИВНЫХ ТАЙМЕРОВ.</div>";
            }

            // Глобальные цели
            const goals = data.tasks_long || [];
            if(goals.length > 0) {
                document.getElementById('goalsList').innerHTML = goals.map(goal => `
                    <div class="list-item"><div class="item-text">TARGET: ${goal}</div></div>
                `).join('');
            } else {
                document.getElementById('goalsList').innerHTML = "<div class='item-text'>> ГЛОБАЛЬНЫХ ЦЕЛЕЙ НЕ НАЙДЕНО.</div>";
            }
        }

        // --- УДАЛЕНИЕ ЗАДАЧИ В FIREBASE ---
        // Делаем функцию глобальной, чтобы ее видел HTML
        window.completeTask = async function(taskText) {
            tg.HapticFeedback.impactOccurred('medium');
            try {
                // Создаем новый массив без удаленной задачи
                const updatedTasks = currentUserData.tasks_short.filter(t => t !== taskText);
                
                // Обновляем базу
                await updateDoc(userDocRef, {
                    tasks_short: updatedTasks
                });
                // Интерфейс обновится сам благодаря onSnapshot!
            } catch (error) {
                console.error("Ошибка при удалении:", error);
                tg.showAlert("Системная ошибка. Доступ запрещен.");
            }
        };

        // --- ЛОГИКА ВКЛАДОК ---
        window.switchTab = function(tabId, navElement) {
            document.querySelectorAll('.tab-content').forEach(tab => tab.classList.remove('active'));
            document.querySelectorAll('.nav-btn').forEach(nav => nav.classList.remove('active'));
            document.getElementById(`tab-${tabId}`).classList.add('active');
            navElement.classList.add('active');
            tg.HapticFeedback.impactOccurred('light');
        };
    </script>
</body>
</html>
